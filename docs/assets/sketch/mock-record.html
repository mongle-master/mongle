<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:430px;height:900px;}
  body{font-family:"Apple SD Gothic Neo","Pretendard",-apple-system,sans-serif;background:#fcfcfb;color:#1c1c1c;overflow:hidden;position:relative;}
  .status{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:14px;font-weight:700;}
  .status .dots{letter-spacing:2px;}
  .bar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:4px 22px 6px;}
  .bar .bk{font-size:19px;font-weight:800;color:#5a5a5a;}
  .bar .ti{text-align:center;font-size:16px;font-weight:800;}
  .bar .sv{text-align:right;font-size:15px;font-weight:800;}

  .q{padding:8px 22px 2px;}
  .q .av{width:36px;height:36px;border-radius:50%;background:#eee;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;}
  .q h1{font-size:20px;font-weight:800;margin-top:9px;}
  .q h1 b{text-decoration:underline;text-underline-offset:4px;text-decoration-thickness:2px;}
  .q .hint{font-size:12.5px;color:#9a9a9a;font-weight:600;margin-top:5px;}

  .grp{padding:14px 22px 0;}
  .lbl{font-size:12.5px;font-weight:800;color:#7a7a7a;margin-bottom:9px;}
  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{font-size:13px;font-weight:700;padding:8px 14px;border-radius:999px;border:1.5px solid #ddd;color:#8c8c8c;background:#fff;display:flex;align-items:center;gap:6px;}
  .chip.on{background:#1c1c1c;color:#fff;border-color:#1c1c1c;}
  .chip svg{width:14px;height:14px;}

  .titlerow{display:flex;align-items:center;gap:9px;border:1.5px solid #e4e4e4;border-radius:12px;padding:11px 13px;background:#fff;}
  .titlerow input{border:none;outline:none;flex:1;font-size:14.5px;font-weight:600;background:transparent;}
  .titlerow input::placeholder{color:#bcbcbc;font-weight:500;}
  .titlerow .cat{font-size:11px;font-weight:800;color:#7a7a7a;background:#f1f1f1;border-radius:7px;padding:4px 9px;white-space:nowrap;}

  .photos{display:flex;gap:9px;}
  .ph{width:66px;height:66px;border-radius:12px;background:#f1f1f1;border:1.5px solid #e6e6e6;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#b0b0b0;letter-spacing:.5px;position:relative;}
  .ph .rm{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:#1c1c1c;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;}
  .ph.add{border-style:dashed;color:#bcbcbc;font-size:22px;}

  .nav{position:absolute;left:0;right:0;bottom:0;height:76px;background:#fff;border-top:1.5px solid #eee;display:flex;align-items:center;justify-content:space-around;padding-bottom:12px;}
  .nav a{font-size:11px;font-weight:700;color:#b3b3b3;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .nav a.on{color:#1c1c1c;}
  .nav .ic{width:21px;height:21px;border:2px solid currentColor;border-radius:6px;}
  .nav a.on .ic{background:#1c1c1c;border-color:#1c1c1c;}
  .nav .plus{width:48px;height:48px;border-radius:50%;background:#1c1c1c;color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;margin-top:-22px;box-shadow:0 6px 16px rgba(0,0,0,.3);}
</style></head><body>
  <div class="status"><span>9:41</span><span class="dots">● ● ●</span></div>
  <div class="bar"><span class="bk">‹</span><span class="ti">새 기록</span><span class="sv">저장</span></div>

  <div class="q">
    <div class="av">민</div>
    <h1>오늘 <b>민지</b>랑 어땠어요?</h1>
    <div class="hint">감정만 골라도 돼요. 세 줄이면 충분해요.</div>
  </div>

  <div class="grp">
    <div class="lbl">오늘의 감정</div>
    <div class="chips">
      <span class="chip on">반가움</span><span class="chip on">뭉클</span><span class="chip">편안</span><span class="chip">즐거움</span><span class="chip">고마움</span><span class="chip">그냥</span>
    </div>
  </div>

  <div class="grp">
    <div class="lbl">제목</div>
    <div class="titlerow">
      <input placeholder="있었던 일을 짧게 적어도 좋아요">
      <span class="cat">만남 ▾</span>
    </div>
  </div>

  <div class="grp">
    <div class="lbl">날씨</div>
    <div class="chips">
      <span class="chip on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2M6 6l1 1M17 17l1 1M18 6l-1 1M7 17l-1 1"/></svg>맑음</span>
      <span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 18h11a4 4 0 0 0 0-8 6 6 0 0 0-11-2 4 4 0 0 0 0 10z"/></svg>흐림</span>
      <span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 14h11a4 4 0 0 0 0-8 6 6 0 0 0-11-2 4 4 0 0 0 0 10z"/><path d="M9 19l-1 2M14 19l-1 2M19 19l-1 2"/></svg>비</span>
      <span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 4v16M5 8l14 8M19 8L5 16"/></svg>쌀쌀</span>
      <span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 14V5a2 2 0 0 1 4 0v9a4 4 0 1 1-4 0z"/></svg>더움</span>
    </div>
  </div>

  <div class="grp">
    <div class="lbl">함께한 사람</div>
    <div class="chips">
      <span class="chip on">민지</span><span class="chip">혼자였던 시간</span><span class="chip">다른 친구</span><span class="chip">가족</span>
    </div>
  </div>

  <div class="grp">
    <div class="lbl">사진 첨부</div>
    <div class="photos">
      <span class="ph"><span class="rm">×</span>PHOTO</span>
      <span class="ph"><span class="rm">×</span>PHOTO</span>
      <span class="ph"><span class="rm">×</span>PHOTO</span>
      <span class="ph add">＋</span>
    </div>
  </div>

  <div class="nav">
    <a class="on"><span class="ic"></span>홈</a>
    <a><span class="ic"></span>사람</a>
    <a class="plus">＋</a>
    <a><span class="ic"></span>타임라인</a>
    <a><span class="ic"></span>설정</a>
  </div>
</body></html>
