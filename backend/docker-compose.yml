# 로컬 실행 절차·환경변수는 docs/runbook/local.md를 참조한다.
# 앱과 DB는 항상 MySQL 스키마를 공유한다. 호스트에서 Nest를 띄울 때도 이 db 서비스를 쓴다.
services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: mongle
      MYSQL_USER: mongle
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mongle}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Seoul
    ports:
      - "13306:3306" # 호스트 로컬 mysql과 충돌 피하려 13306으로 노출(디버깅용)
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 3s
      retries: 24

  backend:
    build: .
    image: mongle-backend:local
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "18080:8080"
    environment:
      # 커스텀 MYSQL_PASSWORD를 쓰면 동일한 비밀번호를 URL-encode한 DATABASE_URL도 함께 지정한다.
      DATABASE_URL: ${DATABASE_URL:-mysql://mongle:mongle@db:3306/mongle}
      MONGLE_JWT_SECRET: ${MONGLE_JWT_SECRET:-mongle-demo-hs256-secret-key-please-change-in-prod}
      MONGLE_JWT_EXPIRATION: ${MONGLE_JWT_EXPIRATION:-30d}
      PORT: 8080
      TZ: Asia/Seoul
    healthcheck:
      # Node 22의 fetch로 실제 health 응답까지 검증한다.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/actuator/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
