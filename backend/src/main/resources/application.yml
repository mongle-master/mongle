spring:
  application:
    name: mongle
  # 로컬 데모용 파일 기반 H2 — 재시작해도 데이터가 남는다.
  # AUTO_SERVER=TRUE: 앱과 H2 콘솔이 같은 파일을 동시에 열 수 있게 한다.
  datasource:
    url: jdbc:h2:file:./data/mongle;AUTO_SERVER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
  jackson:
    time-zone: Asia/Seoul

server:
  port: 8080

mongle:
  # 데모 JWT. secret 은 HS256 최소 길이(32바이트) 이상. 데모라 만료를 길게(30일) 둔다.
  jwt:
    secret: mongle-demo-hs256-secret-key-please-change-in-prod
    expiration: 30d

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    # Orval이 nullable 응답 필드를 `T | null`로 생성할 수 있게 3.0 nullable을 사용한다.
    version: OPENAPI_3_0
