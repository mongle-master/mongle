<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <!-- use-credentials: manifest 요청은 기본이 쿠키 미포함이라, Vercel preview의
         Deployment Protection 쿠키가 안 실려 vercel.com SSO로 리다이렉트되며 CORS로 죽는다. -->
    <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
    <!-- viewport-fit=cover: 없으면 iOS에서 env(safe-area-inset-*)가 전부 0으로 평가돼
         탭바·셸의 노치/홈 인디케이터 패딩이 동작하지 않는다. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#ffffff" />
    <title>Mongle</title>
  </head>
  <!-- data-amp-mask-attributes: Amplitude autocapture가 aria-label·alt·title 속성값을
       수집하지 않게 전역 마스킹. #app이 아니라 body에 둬야 body로 포탈되는
       Radix/vaul 오버레이도 커버된다. (마스킹 계약: src/lib/analytics.ts) -->
  <body data-amp-mask-attributes="aria-label,alt,title">
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
