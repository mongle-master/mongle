# 선택적 Render Blueprint. 현재 운영 SSOT는 Mac mini blue/green 배포다.
# 이 Blueprint을 쓰려면 Render에서 접근 가능한 외부 MySQL 8.4와 Prisma 형식 DATABASE_URL을 별도로 준비한다.
services:
  - type: web
    name: mongle-backend
    runtime: docker
    plan: free
    region: singapore # 무료 티어 중 한국에서 가장 가까움
    rootDir: backend # Dockerfile 경로·빌드 컨텍스트가 이 디렉토리 기준으로 해석됨
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /actuator/health
    autoDeploy: true
    buildFilter:
      paths:
        - backend/** # 백엔드 변경일 때만 재배포
    envVars:
      - key: MONGLE_JWT_SECRET
        generateValue: true
      - key: MONGLE_JWT_EXPIRATION
        value: 30d
      - key: TZ
        value: Asia/Seoul
      # mysql://USER:URL_ENCODED_PASSWORD@HOST:3306/DATABASE
      - key: DATABASE_URL
        sync: false
